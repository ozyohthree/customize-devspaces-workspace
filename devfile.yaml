schemaVersion: 2.2.0
metadata:
  name: customize-devspaces-workspace
  version: 0.1.0
  displayName: Customize DevSpaces Workspace
  description: A Devfile to customize the DevSpaces workspace with a custom .bashrc file
  tags:
    - bash
    - customization
    - devspaces
components:
  - name: tools
    container:
      image: 'registry.redhat.io/devspaces/udi-rhel9:3.22'
      memoryLimit: 512Mi
      memoryRequest: 256Mi
      cpuLimit: '0.5'
      cpuRequest: '0.25'
      mountSources: true

commands:
  - id: create-bashrc-configmap
    exec:
      component: tools
      commandLine: "create-bashrc-cm.sh"
      workingDir: /projects/customize-devspaces-workspace/.devspaces
      group:
        kind: build
  - id: create-vscode-configmap
    exec:
      component: tools
      commandLine: "create-vscode-cm.sh"
      workingDir: /projects/customize-devspaces-workspace/.devspaces
      group:
        kind: build